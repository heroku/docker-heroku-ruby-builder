name: Auto-merge manifest PRs

on:
  pull_request_target:
    types: [labeled, opened, synchronize]
    branches: [main]

jobs:
  auto-merge:
    # Only run for PRs with the 'manifest' label or branch starting with 'manifest/'
    if: |
      contains(github.event.pull_request.labels.*.name, 'manifest') ||
      startsWith(github.event.pull_request.head.ref, 'manifest/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if branch is behind main
        id: check-behind
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Branch is $BEHIND commits behind main"

      - name: Rebase onto main if needed
        if: steps.check-behind.outputs.behind != '0'
        run: |
          echo "Rebasing branch onto main..."
          git rebase origin/main
          git push --force-with-lease origin ${{ github.event.pull_request.head.ref }}

      - name: Enable auto-merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --rebase \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
