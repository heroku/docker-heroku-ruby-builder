name: Consolidate Inventory PRs

on:
  workflow_run:
    workflows: ["Build and upload Ruby runtime", "Build and upload JRuby runtime"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  consolidate:
    runs-on: pub-hk-ubuntu-24.04-xlarge
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch all remote branches
        run: git fetch --all
      - name: Collect inventory files from branches
        run: |
          set -euo pipefail
          mkdir -p /tmp/ruby-sources /tmp/jruby-sources
          for branch in $(git branch -r --list 'origin/inventory/ruby-*'); do
            file="/tmp/ruby-sources/$(echo "$branch" | tr '/' '_').toml"
            git show "${branch}:ruby_inventory.toml" > "$file" || true
          done
          for branch in $(git branch -r --list 'origin/inventory/jruby-*'); do
            file="/tmp/jruby-sources/$(echo "$branch" | tr '/' '_').toml"
            git show "${branch}:jruby_inventory.toml" > "$file" || true
          done
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Merge inventory
        run: |
          set -euo pipefail
          shopt -s nullglob
          cargo run --locked --bin inventory_merge -- --target ruby_inventory.toml /tmp/ruby-sources/*.toml
          cargo run --locked --bin inventory_merge -- --target jruby_inventory.toml /tmp/jruby-sources/*.toml
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          branch: update/consolidated-inventory
          title: "Update Ruby/JRuby inventory"
          body: |
            Consolidated inventory update from build workflows.

            This PR was auto-generated by the `consolidate_inventory` workflow.
          commit-message: "Update inventory"
          delete-branch: true
