name: Build and upload JRuby runtime
run-name: "Build and upload JRuby ${{ inputs.jruby_version }}${{ inputs.dry_run && ' (dry run)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      jruby_version:
          description: "The JRuby version to build, specified as X.Y.Z (i.e. 9.4.7.0)"
          type: string
          required: true
      dry_run:
          description: "Skip deploying to S3 (e.g. for testing)"
          type: boolean
          default: false
          required: false

permissions:
  contents: write
  pull-requests: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"
  S3_BUCKET: "heroku-buildpack-ruby"

jobs:
  build-and-upload:
    runs-on: pub-hk-ubuntu-24.04-xlarge
    strategy:
      fail-fast: false
      matrix:
        base_image: ["heroku-22", "heroku-24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Cargo build
        run: cargo build --locked
      - name: Output CHANGELOG
        run: cargo run --locked --bin jruby_changelog -- --version "${{inputs.jruby_version}}"
      - name: Build Ruby
        run: cargo run --locked --bin jruby_build -- --version ${{inputs.jruby_version}} --base-image ${{matrix.base_image}}
      - name: Check Ruby
        run: cargo run --locked --bin jruby_check -- --version ${{inputs.jruby_version}} --base-image ${{matrix.base_image}} --arch amd64 | tee $GITHUB_STEP_SUMMARY
      - name: Upload Ruby runtime archive to S3 dry run
        if: (inputs.dry_run)
        run: aws s3 sync ./output "s3://${S3_BUCKET}" --dryrun
      - name: Upload Ruby runtime archive to S3 production
        if: (!inputs.dry_run)
        run: aws s3 sync ./output "s3://${S3_BUCKET}"
      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-${{ matrix.base_image }}
          path: jruby_inventory.toml

  create-manifest-pr:
    needs: build-and-upload
    if: ${{ !inputs.dry_run }}
    runs-on: pub-hk-ubuntu-24.04-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Download all inventory artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: inventory-*
          path: artifacts/
      - name: Merge inventories
        run: |
          cargo run --locked --bin inventory_merge -- \
            --base jruby_inventory.toml \
            --output jruby_inventory.toml \
            artifacts/*/jruby_inventory.toml
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: manifest/jruby-${{ inputs.jruby_version }}-${{ github.run_id }}
          title: "Add JRuby ${{ inputs.jruby_version }} to inventory"
          body: |
            Adds JRuby ${{ inputs.jruby_version }} binaries for all supported platforms.

            Built from workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit-message: "Add JRuby ${{ inputs.jruby_version }} to inventory"
          labels: manifest
