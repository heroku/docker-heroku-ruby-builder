name: Build and upload JRuby runtime
run-name: "Build and upload JRuby ${{ inputs.jruby_version }}${{ inputs.dry_run && ' (dry run)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      jruby_version:
          description: "The JRuby version to build, specified as X.Y.Z (i.e. 9.4.7.0)"
          type: string
          required: true
      on_conflict:
          description: "Behavior when the artifact already exists in S3 (or locally)"
          type: choice
          options:
            - skip
            - overwrite
          default: skip
          required: true
      dry_run:
          description: "Skip deploying to S3 (e.g. for testing)"
          type: boolean
          default: false
          required: false

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"
  S3_BUCKET: "heroku-buildpack-ruby"

jobs:
  changelog:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Output CHANGELOG
        run: cargo run --locked --bin jruby_changelog -- --version "${{inputs.jruby_version}}" | tee "$GITHUB_STEP_SUMMARY"

  build-and-upload:
    runs-on: pub-hk-ubuntu-24.04-xlarge
    strategy:
      fail-fast: false
      matrix:
        base_image: ["heroku-22", "heroku-24", "heroku-26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Cargo build
        run: cargo build --locked
      - name: Build JRuby
        id: build
        run: |
          cargo run --locked --bin jruby_build -- \
            --version ${{inputs.jruby_version}} \
            --base-image ${{matrix.base_image}} \
            --on-conflict ${{inputs.on_conflict}} \
            --artifact-dir ./output \
            --cache-dir ./cache \
            --job-metadata "$GITHUB_OUTPUT"
      - name: Check JRuby
        if: steps.build.outputs.status == 'success'
        run: |
          cargo run --locked --bin jruby_check -- \
            --version ${{inputs.jruby_version}} \
            --base-image ${{matrix.base_image}} \
            --arch amd64 \
            --artifact-dir ./output \
            | tee $GITHUB_STEP_SUMMARY
      - name: Upload JRuby runtime archive to S3 dry run
        if: ${{ inputs.dry_run }}
        run: aws s3 sync ./output "s3://${S3_BUCKET}" --dryrun
      - name: Upload JRuby runtime archive to S3 production
        if: ${{ !inputs.dry_run }}
        run: aws s3 sync ./output "s3://${S3_BUCKET}"

