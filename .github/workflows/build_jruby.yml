name: Build and upload JRuby runtime
run-name: "Build and upload JRuby ${{ inputs.jruby_version }}${{ inputs.dry_run && ' (dry run)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      jruby_version:
          description: "The JRuby version to build, specified as X.Y.Z (i.e. 9.4.7.0)"
          type: string
          required: true
      on_conflict:
          description: "Behavior when the artifact already exists in S3 (or locally)"
          type: choice
          options:
            - skip
            - overwrite
          default: skip
          required: true
      dry_run:
          description: "Skip deploying to S3 (e.g. for testing)"
          type: boolean
          default: false
          required: false

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "us-east-1"
  S3_BUCKET: "heroku-buildpack-ruby"

jobs:
  changelog:
    runs-on: pub-hk-ubuntu-24.04-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Output CHANGELOG
        run: cargo run --locked --bin jruby_changelog -- --version "${{inputs.jruby_version}}" | tee "$GITHUB_STEP_SUMMARY"

  build-and-upload:
    runs-on: pub-hk-ubuntu-24.04-xlarge
    strategy:
      fail-fast: false
      matrix:
        base_image: ["heroku-22", "heroku-24", "heroku-26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Cargo build
        run: cargo build --locked
      - name: Build JRuby
        run: |
          cargo run --locked --bin jruby_build -- \
            --version ${{inputs.jruby_version}} \
            --base-image ${{matrix.base_image}} \
            --on-conflict ${{inputs.on_conflict}}
      - name: Check JRuby
        run: |
          set -euo pipefail
          if [ "${{ inputs.on_conflict }}" = "skip" ] && ! ls ./output/**/*.tgz &>/dev/null; then
            echo "Build skipped (on_conflict=skip), nothing to check"
          else
            cargo run --locked --bin jruby_check -- \
              --version ${{inputs.jruby_version}} \
              --base-image ${{matrix.base_image}} \
              --arch amd64 \
              | tee $GITHUB_STEP_SUMMARY
          fi
      - name: Upload JRuby runtime archive to S3 dry run
        if: ${{ inputs.dry_run }}
        run: aws s3 sync ./output "s3://${S3_BUCKET}" --dryrun
      - name: Upload JRuby runtime archive to S3 production
        if: ${{ !inputs.dry_run }}
        run: aws s3 sync ./output "s3://${S3_BUCKET}"
      - name: Upload inventory artifact
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: jruby-inventory-${{ matrix.base_image }}
          path: jruby_inventory.toml

  update-inventory:
    needs: build-and-upload
    if: ${{ !inputs.dry_run }}
    runs-on: pub-hk-ubuntu-24.04-xlarge
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download all inventory artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/inventory-artifacts
          pattern: jruby-inventory-*
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Merge inventory
        run: |
          cargo run --locked --bin inventory_merge -- \
            --target jruby_inventory.toml \
            /tmp/inventory-artifacts/*/jruby_inventory.toml
      - name: Create inventory branch
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          branch: inventory/jruby-${{ inputs.jruby_version }}
          title: "Add JRuby ${{ inputs.jruby_version }} to inventory"
          commit-message: "Add JRuby ${{ inputs.jruby_version }} to inventory"
          add-paths: jruby_inventory.toml
